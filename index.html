<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6; /* Светлый фон */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Важно, чтобы коты не вызывали скролл */
            position: relative; /* Делаем body точкой отсчета для абсолютного позиционирования */
        }

        h1 {
            color: #8b4513;
            z-index: 2; /* Число выше котов */
        }

        /* Контейнер для игры теперь только для котов */
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Коты не будут перехватывать клики */
            padding-top: 10%; /* Отступ сверху, чтобы было видно заголовок */
        }

        .cat-picture {
            position: absolute;
            width: 150px; /* Увеличили размер */
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            opacity: 0.9;
            transition: transform 0.3s ease; /* Добавим плавности */
            user-select: none; /* Нельзя выделить текст на картинке */
            pointer-events: auto; /* Включаем клики конкретно для картинок */
            cursor: pointer;
        }
        .cat-picture:hover {
            transform: scale(1.05); /* Кот увеличивается при наведении */
            z-index: 10; /* При наведении кот поверх остальных */
        }

        #question {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
            z-index: 2; /* Вопрос выше котов */
        }

        #numbers {
            position: fixed; /* Блок с числами всегда внизу экрана */
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 2; /* Числа выше всего остального */
            background-color: rgba(255,255,255,0.7); /* Полупрозрачный фон для читаемости */
            padding: 10px 20px;
            border-radius: 20px;
        }

        button {
            font-size: 1.6em;
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 4px #d2691e;
            transition: all 0.3s ease;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 4px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 4px #FF4500;
        }
    </style>
</head>
<body>

    <h1>Считаем котов!</h1>
    <div id="game-container"></div>
    <div id="question">Сколько котов на крыше?</div>
    <div id="numbers"></div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const questionEl = document.getElementById('question');
        const numbersEl = document.getElementById('numbers');

        let correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;

        // --- ВАЖНАЯ ЧАСТЬ ---
        const catImageLinks = [
             'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota52.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota46.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota44.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota39.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota37.png'
        ];
        // -------------------

        function startGame() {
             gameContainer.innerHTML = '';
             numbersEl.innerHTML = '';
             questionEl.textContent = "Сколько котов на крыше?";
             questionEl.style.color = "#333";
             correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;

             for (let i = 0; i < correctAnswer; i++) {
                  const randomIndex = Math.floor(Math.random() * catImageLinks.length);
                  const imgSrc = catImageLinks[randomIndex];

                  const catImg = document.createElement('img');
                  catImg.src = imgSrc;
                  catImg.classList.add('cat-picture');

                  /* Генерируем случайную позицию в пределах видимой области */
                  const xPos = Math.random() * (window.innerWidth - 150);
                  const yPos = Math.random() * (window.innerHeight / 1.5); /* Ограничиваем высоту */

                  catImg.style.left = `${xPos}px`;
                  catImg.style.top = `${yPos}px`;

                  gameContainer.appendChild(catImg);
             }

             for (let num = 1; num <= 9; num++) {
                  const btn = document.createElement('button');
                  btn.textContent = num;
                  btn.value = num;

                  btn.addEventListener('click', function() {
                      if (parseInt(this.value) === correctAnswer) {
                          this.classList.add('correct');
                          questionEl.textContent = "Верно!";
                          questionEl.style.color = "#2e7d32";
                      } else {
                          this.classList.add('wrong');
                          questionEl.textContent = `Упс! Было ${correctAnswer}.`;
                          questionEl.style.color = "#c62828";
                      }
                      document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                      setTimeout(startGame, 2000);
                  });
                  numbersEl.appendChild(btn);
              }
         }

         startGame();
    </script>
</body>
</html>
