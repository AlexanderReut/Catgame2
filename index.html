<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6;
            margin: 0;
            overflow: hidden; /* Убираем скролл */
            position: relative; /* Точка отсчета для абсолютного позиционирования */
            height: 100vh;
        }

        h1 {
            color: #8b4513;
            text-align: center;
            padding-top: 20px;
            z-index: 3; /* Выше всего остального */
        }

        #question {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
            z-index: 3; /* Выше котов */
        }

        /* --- ИЗМЕНЕНИЯ ДЛЯ ЦИФР ---
           Размещаем блок с цифрами на одну пятую от низа */
        #numbers {
            position: fixed;
            bottom: 20%; /* Одна пятая (20%) от высоты экрана */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 3; /* Выше котов */
            pointer-events: auto; /* Кнопки кликабельны */
        }

        button {
            font-size: 1.6em;
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 4px #d2691e;
            transition: all 0.3s ease;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 4px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 4px #FF4500;
        }

        .cat-picture {
            position: absolute;
            width: 150px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            opacity: 0.9;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>Считаем котов!</h1>
    <div id="game-container"></div>
    <div id="question">Сколько котов на крыше?</div>
    <div id="numbers"></div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const questionEl = document.getElementById('question');
        const numbersEl = document.getElementById('numbers');

        let correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;
        const catSize = 150; // Размер кота в пикселях

        const catImageLinks = [
             'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota52.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota46.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota44.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota39.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota37.png'
        ];

        function startGame() {
             gameContainer.innerHTML = '';
             numbersEl.innerHTML = '';
             questionEl.textContent = "Сколько котов на крыше?";
             questionEl.style.color = "#333";
             correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;

             const placedCats = []; // Массив для хранения позиций уже размещенных котов

             for (let i = 0; i < correctAnswer; i++) {
                  let validPositionFound = false;
                  let newCatPos;

                  // Пробуем найти место, где кот не будет пересекаться с другими
                  while (!validPositionFound) {
                      const xPos = Math.random() * (window.innerWidth - catSize);
                      const yPos = Math.random() * (window.innerHeight - catSize - window.innerHeight / 5); // Не залезаем на зону цифр

                      newCatPos = {x: xPos, y: yPos};

                      // Проверяем пересечение с уже размещенными котами
                      if (placedCats.length === 0) {
                          validPositionFound = true; // Если это первый кот, место всегда валидно
                      } else {
                          let noCollision = true;
                          for (const pos of placedCats) {
                              // Простая проверка по квадрату (AABB)
                              if (
                                  newCatPos.x < pos.x + catSize &&
                                  newCatPos.x + catSize > pos.x &&
                                  newCatPos.y < pos.y + catSize &&
                                  newCatPos.y + catSize > pos.y
                              ) {
                                  noCollision = false;
                                  break; // Нашли пересечение, выходим из цикла проверки
                              }
                          }
                          validPositionFound = noCollision;
                      }
                  }

                  // Позиция найдена, добавляем её в массив
                  placedCats.push(newCatPos);

                  const randomIndex = Math.floor(Math.random() * catImageLinks.length);
                  const imgSrc = catImageLinks[randomIndex];

                  const catImg = document.createElement('img');
                  catImg.src = imgSrc;
                  catImg.classList.add('cat-picture');
                  catImg.style.left = `${newCatPos.x}px`;
                  catImg.style.top = `${newCatPos.y}px`;

                  gameContainer.appendChild(catImg);
             }

             for (let num = 1; num <= 9; num++) {
                  const btn = document.createElement('button');
                  btn.textContent = num;
                  btn.value = num;

                  btn.addEventListener('click', function() {
                      if (parseInt(this.value) === correctAnswer) {
                          this.classList.add('correct');
                          questionEl.textContent = "Верно!";
                          questionEl.style.color = "#2e7d32";
                      } else {
                          this.classList.add('wrong');
                          questionEl.textContent = `Упс! Было ${correctAnswer}.`;
                          questionEl.style.color = "#c62828";
                      }
                      document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                      setTimeout(startGame, 2000);
                  });
                  numbersEl.appendChild(btn);
              }
         }

         startGame();
    </script>
</body>
</html>
